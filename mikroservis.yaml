openapi: 3.0.1
info:
  title: orng-auth-service
  version: 0.1.0-SNAPSHOT

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Авторизация]
      summary: Аутентификация пользователя
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/refresh:
    post:
      tags: [Авторизация]
      summary: Обновление пары JWT токенов
      operationId: refresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponseDto'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/logout:
    post:
      tags: [Авторизация]
      summary: Завершение текущей сессии
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content

  /auth/logout/all:
    post:
      tags: [Авторизация]
      summary: Выход со всех устройств
      operationId: logoutAll
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content

components:
  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

    LoginRequestDto:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 128
        password:
          type: string
          minLength: 8
          maxLength: 255

    AuthenticationResponseDto:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT